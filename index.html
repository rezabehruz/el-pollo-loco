<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <script type="module" src="js/game.js"></script>
    <link rel="shortcut icon" href="./assets/img/icons/favicon.ico" type="image/x-icon">
    <title>El Pollo Loco</title>
  </head>
  <body>
    <div class="content">
      <article>
        <h1>El Pollo Loco</h1>
        <div id="content-canvas" class="content-canvas">
          <canvas id="canvas" class="canvas" width="720" height="480"> </canvas>
        </div>
        <div id="controller" class="content-controller">
          <img
            id="img-start-game"
            class="img-control"
            src="./assets/img/9_intro_outro_screens/start/startscreen_1.png"
            alt="start Game"
          />

          <img
            id="img-win-game"
            class="d-none"
            src="./assets/img/You won, you lost/You Win A.png"
            alt="win game"
          />
          <img
            id="img-lost-game"
            class="d-none"
            src="./assets/img/9_intro_outro_screens/game_over/you lost.png"
            alt="lost game"
          />
          <img
            id="img-game-over"
            class="d-none"
            src="./assets/img/9_intro_outro_screens/game_over/game over.png"
            alt="game over"
          />
          <button id="btn-start" class="btn-start">Let's Go!</button>
          <button id="btn-mute" class="btn-sound">
            <img src="./assets/img/icons/mute-icon.png" alt="mute-icon" />
          </button>
          <button id="btn-unmute" class="d-none">
            <img src="./assets/img/icons/unmute-icon.png" alt="unmute-icon" />
          </button>
          <div id="content-action" class="content-action">
            <!-- <a target="_blank" href="https://icons8.com/icon/63264/next-page">Next Page</a> icon by <a target="_blank" href="https://icons8.com">Icons8</a> -->
            <div class="panel-1">
              <button id="btn-move-left" class="btn-action move-left"><img src="./assets/img/icons/move-up.png" alt="move left"></button>
              <button id="btn-move-right" class="btn-action move-right"><img src="./assets/img/icons/move-up.png" alt="move right"></button>
            </div>
            
            <div class="panel-2">
              <button id="btn-move-up" class="btn-action"><img src="./assets/img/icons/move-up.png" alt="jump"></button>
              <button id="btn-throw" class="btn-action btn-throw"><img src="./assets/img/icons/throw-arrow.png" alt="throw"></button>
            </div>
          </div>
        </div>
        <div class="content-notice">
          <h2>Turn your Device to Play!</h2>
        </div>
      </article>
    </div>
  </body>
</html>
